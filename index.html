<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicolony</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <button id="btn1" class="btn btn-warning">:)</button>
    <button id="btn2" class="btn btn-danger">>:(</button>
    <button id="btn3" class="btn btn-success">:I</button>
    <button id="btn4" class="btn btn-info">B)</button>
    <button id="btn5" class="btn btn-primary">:(</button>
    <button id="btn6" class="btn btn-secondary">:3</button>
    <button id="btn7" class="btn btn-dark">:/</button>
    <button id="btn8" class="btn btn-warning">:)</button>
    <button id="btn9" class="btn btn-danger">>:(</button>
    <button id="btn10" class="btn btn-success">:I</button>
    <button id="btn11" class="btn btn-info">B)</button>
    <button id="btn12" class="btn btn-primary">:(</button>
    <button id="btn13" class="btn btn-secondary">:3</button>
    <button id="btn14" class="btn btn-dark">:/</button>
    <h1 id="score">Score: 0</h1>
    <script>
        const scoreText = document.getElementById("score");
        let score = 0;
        function move(btn) {
        btn.style.position = "absolute";
        btn.style.left = Math.random() * window.innerWidth + "px";
        btn.style.top = Math.random() * window.innerHeight + "px";
        }
        function setup(btn) {
        move(btn);
        btn.addEventListener("click", () => {
            score++;
            scoreText.textContent = "Score: " + score;
            move(btn);
        });
        }
        setup(document.getElementById("btn1"));
        setup(document.getElementById("btn2"));
        setup(document.getElementById("btn3"));
        setup(document.getElementById("btn4"));
        setup(document.getElementById("btn5"));
        setup(document.getElementById("btn6"));
        setup(document.getElementById("btn7"));
        setup(document.getElementById("btn8"));
        setup(document.getElementById("btn9"));
        setup(document.getElementById("btn10"));
        setup(document.getElementById("btn11"));
        setup(document.getElementById("btn12"));
        setup(document.getElementById("btn13"));
        setup(document.getElementById("btn14"));
    </script>
    <button><a href="bugcatch.html">To Bug Hunt</a></button>
</body>
</html>

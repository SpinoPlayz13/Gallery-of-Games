<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-btn {
            width: 80px;
            height: 80px;
            font-size: 30px;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="text-center p-3">
    <h1 id="score">Score: 0</h1>
    <a href="index.html">To Clicolony</a>
    <div id="game"></div>
    <script>
        const emojis = [":)", ">:(", ":I", "B)", ":(", ":3", ":/", ":0", "XD", ":D", ">:3"];
        const cards = [...emojis, ...emojis];
        let score = 0;
        let flipped = [];
        let locked = false;
        const game = document.getElementById("game");
        const scoreText = document.getElementById("score");
        cards.sort(() => Math.random() - 0.5);
        cards.forEach((emoji, index) => {
            const btn = document.createElement("button");
            btn.className = "btn btn-secondary card-btn";
            btn.dataset.value = emoji;
            btn.dataset.index = index;
            btn.textContent = "";
            move(btn);
            btn.addEventListener("click", () => flipCard(btn));
            game.appendChild(btn);
        });
        function move(btn) {
            btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
            btn.style.top = Math.random() * (window.innerHeight - 150) + "px";
        }
        function flipCard(btn) {
            if (locked) return;
            if (flipped.includes(btn)) return;
            btn.textContent = btn.dataset.value;
            flipped.push(btn);
            if (flipped.length === 2) {
                checkMatch();
            }
        }
        function checkMatch() {
            locked = true;
            const [a, b] = flipped;
            if (a.dataset.value === b.dataset.value) {
                score++;
                scoreText.textContent = "Score: " + score;
                a.classList.replace("btn-secondary", "btn-success");
                b.classList.replace("btn-secondary", "btn-success");
                flipped = [];
                locked = false;
            } else {
                setTimeout(() => {
                    a.textContent = "";
                    b.textContent = "";
                    move(a);
                    move(b);
                    flipped = [];
                    locked = false;
                }, 700);
            }
        }
    </script>

</body>
</html>
